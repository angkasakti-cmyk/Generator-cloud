<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator ELITE PRO MAX</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f9; }
.container { background:white; padding:20px; border-radius:12px; max-width:1000px; margin:auto; box-shadow:0 5px 20px rgba(0,0,0,0.1); }

#startVals { width:100%; height:60px; margin-top:10px; font-family:monospace; font-size:16px; }
#output { width:100%; height:300px; margin-top:10px; font-family:monospace; }

input { padding:8px; width:100%; margin-bottom:10px; }

button { padding:10px 18px; margin:5px 5px 5px 0; border:none; border-radius:8px; cursor:pointer; font-size:15px;}
.gen { background:#4CAF50; color:white; }
.copy { background:#2196F3; color:white; }
.xlsx { background:#FF9800; color:white; }
.csv { background:#795548; color:white; }

.stat { margin-top:10px; font-size:14px; font-weight:bold; }
</style>
</head>
<body>

<div class="container">
<h2>🔥 Generator Angka ELITE PRO MAX</h2>

<label>Masukkan Kode Awal (pisahkan enter):</label>
<textarea id="startVals" placeholder="Masukkan kode di sini..."></textarea>

<label>Jumlah Data per Kode:</label>
<input type="number" id="jumlah" value="100">

<button class="gen" onclick="generate()">Generate</button>
<button class="copy" onclick="copyAll()">Copy</button>
<button class="xlsx" onclick="downloadXLSX()">Download XLSX</button>
<button class="csv" onclick="downloadCSV()">Download CSV</button>

<div class="stat" id="stat"></div>
<textarea id="output" readonly></textarea>
</div>

<script>

let generatedData = [];

function splitCode(code){
    let match = code.match(/^(.*?)(\d+)$/);
    if(!match) return null;
    return { prefix: match[1], number: match[2] };
}

function pad(num,len){
    return num.toString().padStart(len,'0');
}

function nextValue(current){
    let last2 = current % 100;
    let last3 = current % 1000;
    let ribuan = Math.floor((current % 10000) / 1000);
    let lastDigit = current % 10;

    if (last3 >= 990 && last3 <= 993) return current + ((ribuan===4)?15:16);
    if (last3 >= 994 && last3 <= 999) return current + ((ribuan===4)?5:6);
    if (last2 >= 40 && last2 <= 42) return current + 17;
    if (last2 >= 43 && last2 <= 49) return current + 7;
    if (lastDigit === 0 || lastDigit === 1) return current + 18;
    return current + 8;
}

function generate(){
    let inputs = document.getElementById("startVals").value.trim().split("\n");
    let jumlah = Number(document.getElementById("jumlah").value);

    generatedData = [];
    let outputText = "";

    for(let code of inputs){
        let parts = splitCode(code.trim());
        if(!parts) continue;

        let prefix = parts.prefix;
        let numStr = parts.number;
        let len = numStr.length;
        let current = parseInt(numStr);

        for(let i=1;i<=jumlah;i++){
            if(i>1) current = nextValue(current);
            let full = prefix + pad(current,len);
            generatedData.push([full]);
            outputText += full + "\r\n";
        }
    }

    document.getElementById("output").value = outputText;
    document.getElementById("stat").innerHTML =
        "Total Generated: " + generatedData.length.toLocaleString();
}

function copyAll(){
    let textarea = document.getElementById("output");
    textarea.select();
    textarea.setSelectionRange(0, 999999);
    document.execCommand("copy");
    alert("Semua hasil berhasil dicopy!");
}

function downloadXLSX(){
    let wb = XLSX.utils.book_new();
    let ws = XLSX.utils.aoa_to_sheet(generatedData);
    XLSX.utils.book_append_sheet(wb, ws, "Data");
    XLSX.writeFile(wb, "Data.xlsx");
}

function downloadCSV(){
    let csv = generatedData.map(r=>r[0]).join("\r\n");
    let blob = new Blob([csv],{type:"text/csv"});
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Data.csv";
    link.click();
}

</script>

</body>
</html>
