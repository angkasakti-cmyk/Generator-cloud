<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Catatan Wilayah Offline</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    padding:15px;
}
.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    margin:3px 0;
    background:#2d89ef;
    color:white;
    cursor:pointer;
}
button.red{background:#e81123;}
input, select, textarea{
    width:100%;
    padding:8px;
    margin:5px 0;
}
.list-item{
    background:#eef2f7;
    padding:8px;
    border-radius:6px;
    margin:5px 0;
    cursor:pointer;
}
</style>
</head>
<body>

<h2>Catatan Wilayah Offline</h2>

<div class="card">
<select id="wilayah"></select>
<select id="sub"></select>

<textarea id="catatan" placeholder="Tulis catatan..."></textarea>

<button onclick="simpan()">Simpan</button>
<button onclick="edit()">Edit</button>
<button onclick="hapus()" class="red">Hapus</button>
<button onclick="copyText()">Copy Sekali Klik</button>
</div>

<div class="card">
<h4>Tambah Wilayah</h4>
<input id="wilayahBaru" placeholder="Nama Wilayah">
<button onclick="tambahWilayah()">Tambah Wilayah</button>

<h4>Tambah Sub Wilayah</h4>
<input id="subBaru" placeholder="Nama Sub Wilayah">
<button onclick="tambahSub()">Tambah Sub</button>
</div>

<div class="card">
<h4>Daftar Catatan</h4>
<div id="list"></div>
</div>

<script>
let selectedIndex = null;

function init(){
    if(!localStorage.getItem("wilayah_list")){
        localStorage.setItem("wilayah_list", JSON.stringify(["Jakarta","Bandung"]));
    }
    loadWilayah();
}

function loadWilayah(){
    let wilayahList = JSON.parse(localStorage.getItem("wilayah_list"));
    let select = document.getElementById("wilayah");
    select.innerHTML="";
    wilayahList.forEach(w=>{
        select.innerHTML += `<option>${w}</option>`;
    });
    loadSub();
}

function loadSub(){
    let w = document.getElementById("wilayah").value;
    let key = "sub_"+w;
    let sub = JSON.parse(localStorage.getItem(key)) || [];
    let select = document.getElementById("sub");
    select.innerHTML="";
    sub.forEach(s=>{
        select.innerHTML += `<option>${s}</option>`;
    });
    loadCatatan();
}

function getKey(){
    let w = document.getElementById("wilayah").value;
    let s = document.getElementById("sub").value;
    return "cat_"+w+"-"+s;
}

function loadCatatan(){
    let list = JSON.parse(localStorage.getItem(getKey())) || [];
    let div = document.getElementById("list");
    div.innerHTML="";
    list.forEach((item,i)=>{
        div.innerHTML += `<div class="list-item" onclick="pilih(${i})">${item}</div>`;
    });
}

function simpan(){
    let list = JSON.parse(localStorage.getItem(getKey())) || [];
    let text = document.getElementById("catatan").value;
    if(text==="") return;
    list.push(text);
    localStorage.setItem(getKey(), JSON.stringify(list));
    document.getElementById("catatan").value="";
    loadCatatan();
}

function pilih(i){
    let list = JSON.parse(localStorage.getItem(getKey()));
    selectedIndex=i;
    document.getElementById("catatan").value=list[i];
}

function edit(){
    if(selectedIndex===null) return;
    let list = JSON.parse(localStorage.getItem(getKey()));
    list[selectedIndex]=document.getElementById("catatan").value;
    localStorage.setItem(getKey(), JSON.stringify(list));
    loadCatatan();
}

function hapus(){
    if(selectedIndex===null) return;
    let list = JSON.parse(localStorage.getItem(getKey()));
    list.splice(selectedIndex,1);
    localStorage.setItem(getKey(), JSON.stringify(list));
    selectedIndex=null;
    document.getElementById("catatan").value="";
    loadCatatan();
}

function copyText(){
    let text = document.getElementById("catatan").value;
    navigator.clipboard.writeText(text);
    alert("Tersalin!");
}

function tambahWilayah(){
    let wilayahList = JSON.parse(localStorage.getItem("wilayah_list"));
    let baru = document.getElementById("wilayahBaru").value;
    if(baru==="") return;
    wilayahList.push(baru);
    localStorage.setItem("wilayah_list", JSON.stringify(wilayahList));
    document.getElementById("wilayahBaru").value="";
    loadWilayah();
}

function tambahSub(){
    let w = document.getElementById("wilayah").value;
    let key = "sub_"+w;
    let sub = JSON.parse(localStorage.getItem(key)) || [];
    let baru = document.getElementById("subBaru").value;
    if(baru==="") return;
    sub.push(baru);
    localStorage.setItem(key, JSON.stringify(sub));
    document.getElementById("subBaru").value="";
    loadSub();
}

document.getElementById("wilayah").onchange=loadSub;
document.getElementById("sub").onchange=loadCatatan;

init();
</script>

</body>
</html>
